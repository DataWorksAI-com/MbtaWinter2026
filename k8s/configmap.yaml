# ============================================================
# ConfigMap: Shared configuration for all MBTA services
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mbta-config
  namespace: mbta
  labels:
    app.kubernetes.io/part-of: mbta-winter-2026
data:
  # Exchange agent config
  USE_SLIM: "true"
  REGISTRY_URL: "http://registry:6900"
  EXCHANGE_AGENT_URL: "http://exchange:8100"

  # Agent URLs (used by SLIM client and orchestrator)
  ALERTS_AGENT_URL: "http://alerts-agent:50051"
  PLANNER_AGENT_URL: "http://planner-agent:50052"
  STOPFINDER_AGENT_URL: "http://stopfinder-agent:50053"
  ALERTS_HTTP_URL: "http://alerts-agent:8001"
  PLANNER_HTTP_URL: "http://planner-agent:8002"
  STOPFINDER_HTTP_URL: "http://stopfinder-agent:8003"

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  CLICKHOUSE_ENABLED: "true"
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: ""
  CLICKHOUSE_DB: "mbta_logs"

  # Application
  LOG_LEVEL: "INFO"

  # Registry federation (switchboard mode)
  # Demo target topology:
  #   - external MIT-NANDA -> mbta-stopfinder
  #   - internal Northeastern NANDA -> mbta-alerts
  #   - internal AGNTCY ADS -> mbta-planner
  ENABLE_FEDERATION: "true"
  SWITCHBOARD_TIMEOUT_SECONDS: "5"
  USE_SWITCHBOARD: "true"
  MIT_NANDA_URL: "https://nest.projectnanda.org"
  # Northeastern NANDA registry (HTTP).
  NEU_REGISTRY_URL: "http://97.107.132.213"
  # AGNTCY ADS gRPC server address (host:port, no scheme).
  AGNTCY_ADS_GRPC_ADDRESS: "66.175.212.73:8888"
  # Legacy HTTP adapter settings. Kept for backwards-compat; gRPC path takes priority.

  AGNTCY_ADS_URL: ""
  # Legacy adapter setting. Official DIR/ADS does not expose /v1/search.
  AGNTCY_ADS_SEARCH_PATH: "/v1/search"

  # Optional external registration settings
  ENABLE_EXTERNAL_REGISTRATION: "false"
  NEU_REGISTRY_REGISTER_URL: ""
  AGNTCY_REGISTER_WEBHOOK_URL: ""

  # LLM Provider config
  LLM_PROVIDER: "anthropic"
  ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"
  OPENAI_MODEL: "gpt-4o-mini"
