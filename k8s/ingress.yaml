apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mbta-ingress
  namespace: mbta
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: exchange
                port:
                  number: 8100

