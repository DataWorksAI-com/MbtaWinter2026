# ============================================================
# Job: Register MBTA agents in NANDA Registry
# Run this after all agents and registry are deployed
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: register-agents
  namespace: mbta
  labels:
    app.kubernetes.io/part-of: mbta-winter-2026
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:latest
          env:
            - name: ENABLE_EXTERNAL_REGISTRATION
              valueFrom:
                configMapKeyRef:
                  name: mbta-config
                  key: ENABLE_EXTERNAL_REGISTRATION
            - name: NEU_REGISTRY_REGISTER_URL
              valueFrom:
                configMapKeyRef:
                  name: mbta-config
                  key: NEU_REGISTRY_REGISTER_URL
            - name: AGNTCY_REGISTER_WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: mbta-config
                  key: AGNTCY_REGISTER_WEBHOOK_URL
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              wait_for_agent_ready() {
                agent_name="$1"
                readiness_url="$2"
                max_attempts="${3:-24}"
                attempt=1

                while [ "$attempt" -le "$max_attempts" ]; do
                  response="$(curl -fsS --max-time 5 "$readiness_url" 2>/dev/null || true)"
                  if [ -n "$response" ] && echo "$response" | grep -Eq '"ready"[[:space:]]*:[[:space:]]*true'; then
                    echo "$agent_name is ready"
                    return 0
                  fi

                  echo "$agent_name not ready yet (attempt $attempt/$max_attempts), retrying in 5s..."
                  attempt=$((attempt + 1))
                  sleep 5
                done

                echo "Timed out waiting for $agent_name readiness at $readiness_url"
                return 1
              }

              echo "Waiting for registry to be ready..."
              until curl -sf http://registry:6900/health; do
                echo "Registry not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Registry is ready!"

              wait_for_agent_ready "Alerts Agent" "http://alerts-agent:8001/health"
              echo "Registering Alerts Agent..."
              curl -fsS -X POST http://registry:6900/register \
                -H "Content-Type: application/json" \
                -d '{
                  "agent_id": "mbta-alerts",
                  "name": "MBTA Service Alerts Agent",
                  "description": "Monitors and reports MBTA service alerts, delays, and disruptions for all transit lines including Red, Orange, Blue, Green, Silver, Commuter Rail, Bus, and Ferry. Provides real-time alert information.",
                  "capabilities": ["alerts", "service_status", "delays", "disruptions"],
                  "agent_url": "http://alerts-agent:8001",
                  "slim_url": "http://alerts-agent:50051",
                  "status": "alive",
                  "protocol": "a2a",
                  "transport": "slim"
                }' >/dev/null
              curl -fsS -X PUT http://registry:6900/agents/mbta-alerts/status \
                -H "Content-Type: application/json" \
                -d '{"alive": true, "capabilities": ["alerts", "service_status", "delays", "disruptions"], "description": "Monitors and reports MBTA service alerts, delays, and disruptions for all transit lines including Red, Orange, Blue, Green, Silver, Commuter Rail, Bus, and Ferry. Provides real-time alert information."}' >/dev/null

              echo ""
              wait_for_agent_ready "Planner Agent" "http://planner-agent:8002/health"
              echo "Registering Planner Agent..."
              curl -fsS -X POST http://registry:6900/register \
                -H "Content-Type: application/json" \
                -d '{
                  "agent_id": "mbta-planner",
                  "name": "MBTA Route Planner Agent",
                  "description": "Plans transit routes between locations in the Boston MBTA network. Can find optimal routes, transfers, and provide trip planning assistance using real-time schedule data.",
                  "capabilities": ["trip_planning", "route_finding", "transfers", "schedules"],
                  "agent_url": "http://planner-agent:8002",
                  "slim_url": "http://planner-agent:50052",
                  "status": "alive",
                  "protocol": "a2a",
                  "transport": "slim"
                }' >/dev/null
              curl -fsS -X PUT http://registry:6900/agents/mbta-planner/status \
                -H "Content-Type: application/json" \
                -d '{"alive": true, "capabilities": ["trip_planning", "route_finding", "transfers", "schedules"], "description": "Plans transit routes between locations in the Boston MBTA network. Can find optimal routes, transfers, and provide trip planning assistance using real-time schedule data."}' >/dev/null

              echo ""
              wait_for_agent_ready "StopFinder Agent" "http://stopfinder-agent:8003/health"
              echo "Registering StopFinder Agent..."
              curl -fsS -X POST http://registry:6900/register \
                -H "Content-Type: application/json" \
                -d '{
                  "agent_id": "mbta-stopfinder",
                  "name": "MBTA Stop Finder Agent",
                  "description": "Finds MBTA stops and stations by name, location, or route. Provides stop details including accessibility, available routes, and nearby connections.",
                  "capabilities": ["stop_search", "station_info", "accessibility", "nearby_stops"],
                  "agent_url": "http://stopfinder-agent:8003",
                  "slim_url": "http://stopfinder-agent:50053",
                  "status": "alive",
                  "protocol": "a2a",
                  "transport": "slim"
                }' >/dev/null
              curl -fsS -X PUT http://registry:6900/agents/mbta-stopfinder/status \
                -H "Content-Type: application/json" \
                -d '{"alive": true, "capabilities": ["stop_search", "station_info", "accessibility", "nearby_stops"], "description": "Finds MBTA stops and stations by name, location, or route. Provides stop details including accessibility, available routes, and nearby connections."}' >/dev/null

              echo ""
              echo "✅ All agents registered and marked alive!"
              curl -s http://registry:6900/list | head -100

              if [ "$ENABLE_EXTERNAL_REGISTRATION" = "true" ]; then
                echo ""
                echo "External registration mirroring enabled"

                if [ -n "$NEU_REGISTRY_REGISTER_URL" ]; then
                  echo "Mirroring to NEU registry at $NEU_REGISTRY_REGISTER_URL"
                  for agent in mbta-alerts mbta-planner mbta-stopfinder; do
                    port="8001"
                    if [ "$agent" = "mbta-planner" ]; then port="8002"; fi
                    if [ "$agent" = "mbta-stopfinder" ]; then port="8003"; fi
                    curl -s -X POST "$NEU_REGISTRY_REGISTER_URL" \
                      -H "Content-Type: application/json" \
                      -d "{\"agent_id\":\"$agent\",\"agent_url\":\"http://$agent:$port\"}" >/dev/null || true
                  done
                fi

                if [ -n "$AGNTCY_REGISTER_WEBHOOK_URL" ]; then
                  echo "Mirroring to AGNTCY webhook at $AGNTCY_REGISTER_WEBHOOK_URL"
                  for agent in mbta-alerts mbta-planner mbta-stopfinder; do
                    curl -s -X POST "$AGNTCY_REGISTER_WEBHOOK_URL" \
                      -H "Content-Type: application/json" \
                      -d "{\"source\":\"mbta-winter-2026\",\"agent_id\":\"$agent\"}" >/dev/null || true
                  done
                fi
              fi

              echo ""
              echo "Switchboard registry status:"
              curl -s http://registry:6900/switchboard/registries || true
